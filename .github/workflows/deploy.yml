name: Build & Deploy SpleenSeg

on:
  push:
    branches: [main]

jobs:
  build-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for DVC)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC with S3 support
        run: pip install "dvc[s3]"

      - name: Pull model and samples from S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.DVC_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-2
        run: dvc pull

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/shan-vision05/spleenseg
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "docker-compose.yml"
          target:   "/opt/spleenseg"

      - name: Pull image and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/spleenseg

            # Write the .env if it doesn't exist yet (first deploy)
            if [ ! -f .env ]; then
              echo "ROOT_PATH=/spleenseg"      >  .env
              echo "DOMAIN=shanmukha.dev"      >> .env
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u shan-vision05 --password-stdin

            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d --remove-orphans

            # Quick health check
            sleep 5
            docker exec $(docker ps -qf name=spleenseg) \
              python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
            echo "Deploy OK"
