# SpleenSeg — drop this file into /etc/nginx/sites-available/ on the VPS,
# then: ln -s /etc/nginx/sites-available/spleenseg.conf /etc/nginx/sites-enabled/
# and:  nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name shanmukha.dev www.shanmukha.dev;

    location /spleenseg/ {
        proxy_pass         http://localhost:8000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (Server-Sent Events) — disable all buffering
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;  # inference can take ~5-10 s; 300 s = safe ceiling
        proxy_set_header       Connection '';

        # Forward the ASGI root path so FastAPI generates correct redirect URLs
        proxy_set_header       X-Forwarded-Prefix /spleenseg;
    }
}
